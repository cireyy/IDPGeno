project:
  name: IDPGeno
  task: ischaemic_stroke_risk_prediction
  seed: 42
  output_dir: outputs/idpgeno_moe

data:
  samples_csv: data/processed_samples_simulated.csv
  snp_tokens_csv: data/processed_snp_tokens_simulated.csv

  participant_col: participant_id
  label_col: label
  gene_col: gene_id
  token_index_col: token_index_within_gene
  geno_col: geno_code
  pos_col: relative_pos
  mask_col: is_valid
  func_cols:
    - maf
    - within_gene_weight_a

  normalize_idp: true

model:
  name: IDPGenoModel
  genotype_vocab_size: 3

  token_embedding:
    token_embed_dim: 64
    func_dim: 2
    dropout: 0.1

  gene_encoder:
    gene_embed_dim: 64
    dropout: 0.1

  idp_encoder:
    hidden_dim: 64
    dropout: 0.1

  film:
    use_residual: true
    dropout: 0.1

  backbone:
    type: moe_transformer
    embed_dim: 64
    num_layers: 2
    num_heads: 4
    ff_hidden_dim: 128
    num_experts: 4
    dropout: 0.1
    pooling: mean

  classifier:
    hidden_dim: 64
    dropout: 0.1

training:
  device: auto
  num_folds: 5
  num_epochs: 10
  batch_size: 32
  num_workers: 0

  optimizer:
    type: adam
    lr: 0.001
    weight_decay: 0.0

  loss:
    type: bce_with_logits
    use_pos_weight: true

  scheduler:
    use: false
    type: reduce_on_plateau
    mode: max
    factor: 0.5
    patience: 3
    min_lr: 1.0e-6

  early_stopping:
    use: false
    monitor: auc
    mode: max
    patience: 10

  checkpoint:
    save_best_only: true
    monitor: auc
    mode: max
    dir: checkpoints/idpgeno_moe

evaluation:
  threshold: 0.5
  metrics:
    - auc
    - acc
    - precision
    - recall
    - f1

logging:
  print_every_epoch: true
  save_fold_predictions: false
  verbose: true